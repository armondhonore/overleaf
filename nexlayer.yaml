application:
  name: overleaf
  pods:
  - name: app
    image: sharelatex/sharelatex:latest
    path: /
    servicePorts:
    - 80
    vars:
      REDIS_HOST: redis.pod
      MONGO_URL: "mongodb://mongo.pod:27017/sharelatex"
      SHARELATEX_APP_NAME: "Overleaf CE"
    volumes:
    - name: overleaf-data
      mountPath: /var/lib/sharelatex
      size: 10Gi
  - name: mongo
    image: mongo:6
    servicePorts:
    - 27017
    volumes:
    - name: overleaf-mongo
      mountPath: /data/db
      size: 10Gi
  - name: redis
    image: redis:7-alpine
    servicePorts:
    - 6379
