application:
  name: overleaf
  pods:
  - name: app
    image: sharelatex/sharelatex:5
    path: /
    servicePorts:
    - 80
    vars:
      OVERLEAF_REDIS_HOST: overleaf-redis.pod
      REDIS_HOST: overleaf-redis.pod
      OVERLEAF_MONGO_URL: "mongodb://overleaf-mongo.pod:27017/sharelatex"
      MONGO_URL: "mongodb://overleaf-mongo.pod:27017/sharelatex"
      SHARELATEX_APP_NAME: "Overleaf CE"
    volumes:
    - name: overleaf-data
      mountPath: /var/lib/overleaf
      size: 10Gi
  - name: overleaf-mongo
    image: mongo:6
    servicePorts:
    - 27017
    volumes:
    - name: overleaf-mongo
      mountPath: /data/db
      size: 10Gi
  - name: overleaf-redis
    image: redis:7-alpine
    servicePorts:
    - 6379
